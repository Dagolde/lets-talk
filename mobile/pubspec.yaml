name: lets_talk
description: A WeChat-like chat application with payment integration and AI-powered product search.

publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter

  # State Management
  provider: ^6.1.1
  riverpod: ^2.4.9

  # HTTP & API
  dio: ^5.3.2
  retrofit: ^4.0.3
  json_annotation: ^4.8.1

  # Local Storage
  shared_preferences: ^2.2.2
  hive: ^2.2.3
  hive_flutter: ^1.1.0

  # UI Components
  cupertino_icons: ^1.0.2
  flutter_svg: ^2.0.9
  cached_network_image: ^3.3.0
  image_picker: ^1.0.4
  video_player: ^2.8.1
  photo_view: ^0.15.0
  shimmer: ^3.0.0

  # Real-time Communication
  web_socket_channel: ^3.0.3
  socket_io_client: ^3.1.2

  # QR Code & Camera
  mobile_scanner: ^3.5.6
  qr_flutter: ^4.1.0
  camera: ^0.11.2
  permission_handler: ^12.0.1

  # Payment Integration
  # stripe_platform_interface: ^11.5.0  # Temporarily commented out due to compilation issues
  # stripe_android: ^11.5.0  # Temporarily commented out due to compilation issues
  # stripe_ios: ^11.5.0  # Temporarily commented out due to compilation issues

  # AI & Image Processing
  google_ml_kit: ^0.20.0
  image: ^4.1.3
  tflite_flutter: ^0.11.0

  # Notifications
  firebase_messaging: ^16.0.0
  firebase_core: ^4.0.0
  flutter_local_notifications: ^19.4.0

  # Maps & Location
  google_maps_flutter: ^2.5.3
  geolocator: ^14.0.2
  geocoding: ^4.0.0

  # Utilities
  intl: ^0.20.2
  url_launcher: ^6.2.1
  device_info_plus: ^10.0.0
  package_info_plus: ^8.3.1
  connectivity_plus: ^6.1.5
  path_provider: ^2.1.1
  file_picker: ^10.3.2
  flutter_secure_storage: ^9.0.0
  crypto: ^3.0.3
  encrypt: ^5.0.3
  webview_flutter: ^4.4.2
  webview_flutter_android: ^3.12.0
  webview_flutter_wkwebview: ^3.9.2

  # Audio & Voice
  record: ^6.1.0
  audioplayers: ^6.5.0
  flutter_sound: ^9.2.13

  # Charts & Analytics
  fl_chart: ^1.0.0

  # Social Features
  share_plus: ^10.0.0
  flutter_contacts: ^1.1.7+1

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^5.0.0
  build_runner: ^2.4.7
  retrofit_generator: ^8.2.1
  json_serializable: ^6.7.1
  hive_generator: ^2.0.1

flutter:
  uses-material-design: true

  assets:
    - assets/images/
    - assets/icons/
    - assets/animations/
    - assets/sounds/

  fonts:
    - family: Roboto
      fonts:
        - asset: assets/fonts/Roboto-Regular.ttf
        - asset: assets/fonts/Roboto-Bold.ttf
          weight: 700
        - asset: assets/fonts/Roboto-Light.ttf
          weight: 300
